version: 2

project_name: ports

builds:
  - binary: ports
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

homebrew_casks:
  - repository:
      owner: pyjeebz
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/pyjeebz/ports
    description: "See what's running on your machine, by project — and kill it by name"

scoops:
  - repository:
      owner: pyjeebz
      name: scoop-bucket
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: bucket
    homepage: https://github.com/pyjeebz/ports
    description: "See what's running on your machine, by project — and kill it by name."

checksum:
  name_template: checksums.txt

changelog:
  use: git

release:
  draft: true
